services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: studentsystem_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Passw0rd
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'YourStrong@Passw0rd' -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: studentsystem_api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Server=sqlserver,1433;Database=StudentSystemDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;
      - Jwt__Key=StudentSystemSuperSecretKey_2026_WebEngineering!
      - Jwt__Issuer=StudentSystemAPI
      - Jwt__Audience=StudentSystemClient
      - ASPNETCORE_URLS=http://+:8080
    ports:
      - "5000:8080"
    restart: unless-stopped

volumes:
  sqlserver_data:
